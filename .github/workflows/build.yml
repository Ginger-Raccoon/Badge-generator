name: Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [macos-15, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Make
        run: npm run make

      - name: Add unquarantine helper (macOS)
        if: runner.os == 'macOS'
        run: cp scripts/unquarantine-mac.command scripts/README-mac.md out/make/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: out/make/
